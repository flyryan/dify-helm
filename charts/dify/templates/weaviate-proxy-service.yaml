{{- if .Values.ingress.enabled -}}
{{- if .Values.weaviate.proxy.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dify.fullname" . }}-weaviate-proxy
  labels:
    {{- include "dify.labels" . | nindent 4 }}
    component: weaviate-proxy
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "dify.selectorLabels" . | nindent 4 }}
    component: weaviate-proxy
{{- end }}
{{- end }}
