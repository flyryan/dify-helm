{{- if .Values.ingress.enabled -}}
{{- if .Values.weaviate.proxy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dify.fullname" . }}-weaviate-proxy
  labels:
    {{- include "dify.labels" . | nindent 4 }}
    component: weaviate-proxy
spec:
  replicas: {{ .Values.weaviate.proxy.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "dify.selectorLabels" . | nindent 6 }}
      component: weaviate-proxy
  template:
    metadata:
      labels:
        {{- include "dify.selectorLabels" . | nindent 8 }}
        component: weaviate-proxy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/weaviate-proxy-configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.weaviate.proxy.resources | nindent 10 }}
      volumes:
      - name: nginx-config
        configMap:
          name: {{ include "dify.fullname" . }}-weaviate-proxy
{{- end }}
{{- end }}
