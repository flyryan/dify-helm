# Dify Production Environment Values
# Deployment to trendgpt-dify namespace in new environment

# Image versions (using stable hotfix versions)
image:
  api:
    repository: langgenius/dify-api
    tag: "1.8.1"
  web:
    repository: langgenius/dify-web
    tag: "1.8.1"
  sandbox:
    repository: langgenius/dify-sandbox
    tag: "0.2.12"
  pluginDaemon:
    repository: langgenius/dify-plugin-daemon
    tag: "0.2.0-local"

# API configuration
api:
  # 2 replicas for HA; pod affinity keeps them co-located for shared RWO PVC
  replicas: 2
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: component
                  operator: In
                  values:
                    - api
            topologyKey: kubernetes.io/hostname
  # Environment variables - Updated for internal ingress access
  extraEnv:
    - name: CONSOLE_WEB_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: INIT_PASSWORD
      value: "password"
    - name: CONSOLE_API_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: SERVICE_API_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: APP_WEB_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: FILES_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: LITELLM_MODIFY_PARAMS
      value: "true"
    # Resilience: 4 workers so slow LLM calls don't starve health probes
    - name: SERVER_WORKER_AMOUNT
      value: "4"
    - name: GUNICORN_TIMEOUT
      value: "600"
    # Cap pool so 4 workers × (10 + 5) = 60 conns fits well under Postgres max_connections
    - name: SQLALCHEMY_POOL_SIZE
      value: "10"
    - name: SQLALCHEMY_MAX_OVERFLOW
      value: "5"
    # Drop dead sockets left over from OOMKilled pods
    - name: SQLALCHEMY_POOL_PRE_PING
      value: "true"
    - name: SQLALCHEMY_POOL_RECYCLE
      value: "1800"
  # Resources for 4 gevent workers — raised to stop OOMKill loop under plugin+embedding load
  resources:
    requests:
      cpu: '500m'
      memory: '2Gi'
    limits:
      cpu: '2'
      memory: '8Gi'
  # Relaxed probes: slow upstream LLM endpoints shouldn't crash-loop the API
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 10
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 10
    successThreshold: 1
  # Persistence configuration
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      size: 16Gi

# Worker configuration
worker:
  # 2 replicas, 4 gevent greenlets each → 8x ingestion concurrency vs prior 1x
  replicas: 2
  extraEnv:
    - name: LITELLM_MODIFY_PARAMS
      value: "true"
    # 4 gevent greenlets per worker process = 4 concurrent indexing tasks per pod
    - name: CELERY_WORKER_AMOUNT
      value: "4"
    # Match api pool caps so worker doesn't exhaust max_connections during embedding bursts
    - name: SQLALCHEMY_POOL_SIZE
      value: "10"
    - name: SQLALCHEMY_MAX_OVERFLOW
      value: "5"
    - name: SQLALCHEMY_POOL_PRE_PING
      value: "true"
    - name: SQLALCHEMY_POOL_RECYCLE
      value: "1800"
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
  # Force worker to run on same node as API for PVC sharing
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - api
        topologyKey: kubernetes.io/hostname

# Plugin Daemon configuration
pluginDaemon:
  # 2 replicas for HA; same-node affinity keeps them on one host for shared RWO PVC
  replicas: 2
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: component
                  operator: In
                  values:
                    - plugin-daemon
            topologyKey: kubernetes.io/hostname
  extraEnv:
    - name: FORCE_VERIFYING_SIGNATURE
      value: "false"
  # Explicit resources — otherwise inherits namespace LimitRange (1 CPU / 2Gi), which OOMs
  resources:
    requests:
      cpu: '200m'
      memory: '1Gi'
    limits:
      cpu: '2'
      memory: '4Gi'
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      size: 16Gi

# PostgreSQL configuration
postgresql:
  primary:
    persistence:
      size: 64Gi
    # Headroom above default 100; a primary restart is required when this changes
    extendedConfiguration: |
      max_connections = 200
  readReplicas:
    persistence:
      size: 32Gi
    extendedConfiguration: |
      max_connections = 200

# Redis configuration
redis:
  master:
    persistence:
      size: 16Gi
  replica:
    persistence:
      size: 16Gi

# Weaviate configuration - FIXED FOR OOM ISSUES + READ-ONLY ACCESS
weaviate:
  storage:
    size: 64Gi

  # Service configuration - ClusterIP for ingress access
  service:
    type: ClusterIP
    name: weaviate

  # NGINX Proxy for path rewriting (/weaviate/* -> /*)
  proxy:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: '100m'
        memory: '128Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'

  resources:
    requests:
      cpu: '4'
      memory: '16Gi'
    limits:
      cpu: '8'
      memory: '40Gi'  # Raised from 24Gi — was at 95% under 10K doc / 52K segment load

  # Authentication configuration
  authentication:
    anonymous_access:
      enabled: false
    apikey:
      enabled: true
      allowed_keys:
        - "WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih"  # Dify admin key (existing)
        - "UK5wySunCaNwYBNsXoo5T9cNeHcQPccvS91UB0mh4-4"  # Team read-only key (new)
      users:
        - "hello@dify.ai"        # Dify admin user
        - "team@trendmicro.com"  # Team read-only user

  # Authorization configuration - Admin List with read-only support
  authorization:
    admin_list:
      enabled: true
      users:
        - "hello@dify.ai"  # Full admin access (Dify keeps write permissions)
      read_only_users:
        - "team@trendmicro.com"  # Read-only access for external team

  env:
    # Enable automatic resource limiting
    LIMIT_RESOURCES: "true"
    # Set GOMEMLIMIT to 36GiB (below the 40Gi limit) — headroom for GC overhead
    GOMEMLIMIT: 36GiB
    # Reduce GC aggressiveness to allow more memory usage before triggering GC
    GOGC: 200
    # Increase query result limit if needed
    QUERY_MAXIMUM_RESULTS: 100000
    # Make vector cache prefilling asynchronous (avoid loading all at startup)
    HNSW_STARTUP_WAIT_FOR_VECTOR_CACHE: "false"
    # Authentication and Authorization for read-only access
    AUTHENTICATION_APIKEY_ENABLED: "true"
    AUTHENTICATION_APIKEY_ALLOWED_KEYS: "WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih,UK5wySunCaNwYBNsXoo5T9cNeHcQPccvS91UB0mh4-4"
    AUTHENTICATION_APIKEY_USERS: "hello@dify.ai,team@trendmicro.com"
    AUTHORIZATION_ADMINLIST_ENABLED: "true"
    AUTHORIZATION_ADMINLIST_USERS: "hello@dify.ai"
    AUTHORIZATION_ADMINLIST_READONLY_USERS: "team@trendmicro.com"

# Proxy configuration - optimize for better performance
proxy:
  resources:
    requests:
      cpu: '500m'
      memory: '1Gi'
    limits:
      cpu: '2'
      memory: '4Gi'

# Web configuration - optimize for better performance  
web:
  resources:
    requests:
      cpu: '500m'
      memory: '1Gi'
    limits:
      cpu: '2'
      memory: '4Gi'

# Ingress configuration - Internal ALB for secure access
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: 'rdsec.internal-services'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: 'ip'
    alb.ingress.kubernetes.io/scheme: internal
  hosts:
    - host: "trendgptdify.runtime.trendmicro.com"
      paths:
        # Weaviate path - MUST come first for proper routing (more specific)
        # Routes to NGINX proxy which strips /weaviate prefix before forwarding to Weaviate
        - path: /weaviate
          pathType: Prefix
          backend:
            service:
              name: dify-weaviate-proxy
              port:
                number: 80
        # Dify path - catch-all route (less specific, must come last)
        - path: /
          pathType: Prefix

# Service Configuration - ClusterIP for internal ingress access
service:
  enabled: true
  name: dify
  type: ClusterIP
  port: 443

# Keep-alive CronJob to prevent nginx timeout issues
keepalive:
  enabled: true
  schedule: "* * * * *"  # Every minute
  image: curlimages/curl:latest