# Dify Production Environment Values
# Deployment to trendgpt-dify namespace in new environment

# Image versions (using stable hotfix versions)
image:
  api:
    repository: langgenius/dify-api
    tag: "1.8.1"
  web:
    repository: langgenius/dify-web
    tag: "1.8.1"
  sandbox:
    repository: langgenius/dify-sandbox
    tag: "0.2.12"
  pluginDaemon:
    repository: langgenius/dify-plugin-daemon
    tag: "0.2.0-local"

# API configuration
api:
  # Environment variables - Updated for internal ingress access
  extraEnv:
    - name: CONSOLE_WEB_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: INIT_PASSWORD
      value: "password"
    - name: CONSOLE_API_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: SERVICE_API_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: APP_WEB_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: FILES_URL
      value: "https://trendgptdify.runtime.trendmicro.com"
    - name: LITELLM_MODIFY_PARAMS
      value: "true"
  # Persistence configuration
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      size: 16Gi

# Worker configuration
worker:
  extraEnv:
    - name: LITELLM_MODIFY_PARAMS
      value: "true"
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
  # Force worker to run on same node as API for PVC sharing
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: component
            operator: In
            values:
            - api
        topologyKey: kubernetes.io/hostname

# Plugin Daemon configuration
pluginDaemon:
  extraEnv:
    - name: FORCE_VERIFYING_SIGNATURE
      value: "false"
  persistence:
    persistentVolumeClaim:
      accessModes: ReadWriteOnce
      size: 16Gi

# PostgreSQL configuration
postgresql:
  primary:
    persistence:
      size: 64Gi
  readReplicas:
    persistence:
      size: 32Gi

# Redis configuration
redis:
  master:
    persistence:
      size: 16Gi
  replica:
    persistence:
      size: 16Gi

# Weaviate configuration - FIXED FOR OOM ISSUES + READ-ONLY ACCESS
weaviate:
  storage:
    size: 64Gi

  # Service configuration - ClusterIP for ingress access
  service:
    type: ClusterIP
    name: weaviate

  # NGINX Proxy for path rewriting (/weaviate/* -> /*)
  proxy:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: '100m'
        memory: '128Mi'
      limits:
        cpu: '500m'
        memory: '512Mi'

  resources:
    requests:
      cpu: '4'
      memory: '16Gi'
    limits:
      cpu: '8'
      memory: '24Gi'  # Increased from 16Gi

  # Authentication configuration
  authentication:
    anonymous_access:
      enabled: false
    apikey:
      enabled: true
      allowed_keys:
        - "WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih"  # Dify admin key (existing)
        - "UK5wySunCaNwYBNsXoo5T9cNeHcQPccvS91UB0mh4-4"  # Team read-only key (new)
      users:
        - "hello@dify.ai"        # Dify admin user
        - "team@trendmicro.com"  # Team read-only user

  # Authorization configuration - Admin List with read-only support
  authorization:
    admin_list:
      enabled: true
      users:
        - "hello@dify.ai"  # Full admin access (Dify keeps write permissions)
      read_only_users:
        - "team@trendmicro.com"  # Read-only access for external team

  env:
    # Enable automatic resource limiting
    LIMIT_RESOURCES: "true"
    # Set GOMEMLIMIT to 22GiB (below the 24Gi limit)
    GOMEMLIMIT: 22GiB
    # Reduce GC aggressiveness to allow more memory usage before triggering GC
    GOGC: 200
    # Increase query result limit if needed
    QUERY_MAXIMUM_RESULTS: 100000
    # Make vector cache prefilling asynchronous (avoid loading all at startup)
    HNSW_STARTUP_WAIT_FOR_VECTOR_CACHE: "false"
    # Authentication and Authorization for read-only access
    AUTHENTICATION_APIKEY_ENABLED: "true"
    AUTHENTICATION_APIKEY_ALLOWED_KEYS: "WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih,UK5wySunCaNwYBNsXoo5T9cNeHcQPccvS91UB0mh4-4"
    AUTHENTICATION_APIKEY_USERS: "hello@dify.ai,team@trendmicro.com"
    AUTHORIZATION_ADMINLIST_ENABLED: "true"
    AUTHORIZATION_ADMINLIST_USERS: "hello@dify.ai"
    AUTHORIZATION_ADMINLIST_READONLY_USERS: "team@trendmicro.com"

# Proxy configuration - optimize for better performance
proxy:
  resources:
    requests:
      cpu: '500m'
      memory: '1Gi'
    limits:
      cpu: '2'
      memory: '4Gi'

# Web configuration - optimize for better performance  
web:
  resources:
    requests:
      cpu: '500m'
      memory: '1Gi'
    limits:
      cpu: '2'
      memory: '4Gi'

# Ingress configuration - Internal ALB for secure access
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: 'rdsec.internal-services'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: 'ip'
    alb.ingress.kubernetes.io/scheme: internal
  hosts:
    - host: "trendgptdify.runtime.trendmicro.com"
      paths:
        # Weaviate path - MUST come first for proper routing (more specific)
        # Routes to NGINX proxy which strips /weaviate prefix before forwarding to Weaviate
        - path: /weaviate
          pathType: Prefix
          backend:
            service:
              name: dify-weaviate-proxy
              port:
                number: 80
        # Dify path - catch-all route (less specific, must come last)
        - path: /
          pathType: Prefix

# Service Configuration - ClusterIP for internal ingress access
service:
  enabled: true
  name: dify
  type: ClusterIP
  port: 443

# Keep-alive CronJob to prevent nginx timeout issues
keepalive:
  enabled: true
  schedule: "* * * * *"  # Every minute
  image: curlimages/curl:latest